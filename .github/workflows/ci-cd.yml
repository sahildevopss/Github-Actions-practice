name: CI-CD pipeline

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-22.04
    steps:
      - name: clone the code
        run: echo "clonning the code"

  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: building using docker
        run: echo "Build the code"

  test:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Testing the code
        run: echo "Testing the cases"
    

  deploy:
    needs: [build,test]
    runs-on: ubuntu-22.04
    steps:
      - name: Deploy the pipeline
        run: echo "Deploying the full CI/CD pipeline"
